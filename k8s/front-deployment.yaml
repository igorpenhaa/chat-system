apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_BASE_URL
              value: "/api"
            - name: CENTRAL_SERVICE_URL
              value: "http://central.chat-system.svc.cluster.local:8080"

