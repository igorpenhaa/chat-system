apiVersion: v1
kind: Service
metadata:
  name: servera
  namespace: chat-system
  labels:
    app: servera
spec:
  clusterIP: None
  selector:
    app: servera
  ports:
    - name: grpc
      protocol: TCP
      port: 50051
      targetPort: 50051
    - name: metrics
      protocol: TCP
      port: 8000
      targetPort: 8000
