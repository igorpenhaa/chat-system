syntax = "proto3";

package chat;

message JoinRequest {
  string username = 1;
  string forum_id = 2;
}

message Message {
  string username = 1;
  string forum_id = 2;
  string text = 3;
  int64 timestamp = 4;
}

message Empty {}

message CheckResponse {
  bool allowed = 1;
  string reason = 2;
}

message HistoryRequest {
  string forum_id = 1;
}

message HistoryResponse {
  repeated Message messages = 1;
}

service ChatServer {
  rpc JoinForum (JoinRequest) returns (stream Message);
  rpc SendMessage (Message) returns (Empty);
  rpc GetHistory (HistoryRequest) returns (HistoryResponse); // Nova função RPC
}

service Checker {
  rpc CheckMessage (Message) returns (CheckResponse);
}
